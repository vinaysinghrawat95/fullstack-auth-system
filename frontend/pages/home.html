<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="../css/home.css">
</head>

<body>
    <nav>
        <div class="logo">
            <img src="../assets/icons/two-factor-authentication.png" alt="logo">
            <h3>Auth-system</h3>
        </div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="greet">
            <h2>Welcome, Hey <span id="usernameGreet"></span></h2>
            <img src="../assets/icons/wave.png" alt="">
        </div>
    </section>

    <section class="information">
        <div class="profile-card">
            <div class="profile-row">
                <span class="label">User Id:</span>
                <span class="value" id="userId"></span>
            </div>

            <hr>

            <div class="profile-row">
                <span class="label">Username:</span>
                <span class="value" id="usernameCard"></span>
            </div>

            <hr>

            <div class="profile-row">
                <span class="label">Email:</span>
                <span class="value" id="email"></span>
            </div>

        </div>

        <button class="logout-btn">Logout</button>
    </section>

    <script src="../js/home.js"></script>

</body>
</html>
